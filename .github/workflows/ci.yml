name: CI

on:
  push:
    branches: [main]
  pull_request:

# Read-only token. Using the `pull_request` event (not `pull_request_target`)
# means PRs from forks run in the fork's context with no access to repository
# secrets — safe for community contributions.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test & lint (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev,cc-plugin]"

      - name: Lint
        run: ruff check . && ruff format --check .

      - name: Test
        run: python -m pytest
