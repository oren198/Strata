name: CI

on:
  push:
    branches: [main]
  pull_request:

# Read-only token. Using the `pull_request` event (not `pull_request_target`)
# means PRs from forks run in the fork's context with no access to repository
# secrets — safe for community contributions.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test & lint (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # NOTE: the branch ruleset requires a status check named "CI". That is the
    # `ci` gate job below, not this matrix job. Keep the names in sync.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check . && ruff format --check .

      - name: Test
        run: python -m pytest

  # Non-editable install smoke: build the wheel, install it into a clean
  # venv, and walk the brownfield flow. Editable installs mask packaging
  # bugs (missing package data, deps hidden in extras) — this leg is the
  # only place they can surface before a user does (issues #40/#43 dogfood).
  wheel-smoke:
    name: wheel install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: pipx run build --wheel

      - name: Install wheel into a clean venv
        run: |
          python -m venv /tmp/wheelenv
          /tmp/wheelenv/bin/pip install --quiet dist/*.whl

      - name: strata register + refuse-to-start smoke (foreign project)
        run: |
          set -eu
          mkdir /tmp/foreign && cd /tmp/foreign && git init -q
          /tmp/wheelenv/bin/strata register
          test -f .strata/config.toml
          test -f .strata/fleet.yaml
          # No binding → must exit 1 with the aggregated refuse-to-start
          # message, NOT a traceback.
          set +e
          out=$(/tmp/wheelenv/bin/strata-mcp </dev/null 2>&1)
          rc=$?
          set -e
          [ "$rc" -eq 1 ]
          echo "$out" | grep -q "refuses to start"
          if echo "$out" | grep -q "Traceback"; then
            echo "strata-mcp crashed with a traceback:"; echo "$out"; exit 1
          fi

      # The Console must serve from the wheel install (issue #65) — a
      # repo-root ui/ path resolves to nothing in site-packages, and the
      # static mount silently serves 404s.
      - name: Console UI serves from the wheel
        run: |
          set -eu
          mkdir /tmp/uismoke && cd /tmp/uismoke
          /tmp/wheelenv/bin/strata start --port 8971 > server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          curl --retry 20 --retry-connrefused --retry-delay 1 -fsS \
            http://127.0.0.1:8971/ui/index.html | grep -q "Strata Console"
          curl -fsS -o /dev/null http://127.0.0.1:8971/ui/atlas.css
          curl -fsS -o /dev/null http://127.0.0.1:8971/scopes

  # Windows is the real target for `strata launch` (issue #20): POSIX uses
  # execvp, Windows spawns a console-sharing child and propagates its exit
  # code. A dedicated lane keeps this from regressing without ballooning the
  # cross-platform matrix. Focused on the launch surface, not the full suite.
  windows-launch:
    name: windows launch (py3.12)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: strata launch --help
        run: python -m strata launch --help

      - name: Launch handoff — fake claude (exits 0), env bound to the child
        run: |
          set -eu
          mkdir -p fakebin
          # Fake claude: echo the bound env, then exit 0. printf keeps this off
          # heredoc indentation; %% escapes to a literal % for the batch vars.
          printf '@echo off\r\necho FAKE scope=%%STRATA_AGENT_SCOPE%% skill=%%STRATA_AGENT_SKILL%%\r\nexit /b 0\r\n' > fakebin/claude.cmd
          printf 'strata:\n  - id: L1\n    name: Function\n    ordinal: 1\nscopes:\n  - id: g_arch\n    name: Architect\n    stratum_id: L1\n    default_skill: code-writer\nedges: []\n' > fleet.yaml
          export PATH="$PWD/fakebin:$PATH"
          export STRATA_FLEET_CONFIG="$PWD/fleet.yaml"
          out=$(python -m strata launch g_arch --skip-preflight --skip-refresh)
          echo "$out"
          echo "$out" | grep -q "scope=g_arch skill=code-writer"

      - name: Launch test suite (Windows spawn path + real fake-claude child)
        run: python -m pytest tests/test_launch.py -q

      # Issue #66's three Windows-portability fixes (PR #84): strata-mcp.exe
      # console-script entry point, TOML path escaping for absolute Windows
      # paths (test_project_config.py), and packaging (test_packaging.py).
      # Runs on this real Windows runner so a regression in any of the three
      # is caught here, not just on Linux.
      - name: Windows portability suite (issue #66 / PR #84)
        run: python -m pytest tests/test_packaging.py tests/test_project_config.py -q

  # Single, stable status-check context required by the branch ruleset.
  # Succeeds only if every matrix leg of `test` succeeded.
  ci:
    name: CI
    needs: [test, wheel-smoke, windows-launch]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify matrix result
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.wheel-smoke.result }}" != "success" ] || [ "${{ needs.windows-launch.result }}" != "success" ]; then
            echo "test: ${{ needs.test.result }}, wheel-smoke: ${{ needs.wheel-smoke.result }}, windows-launch: ${{ needs.windows-launch.result }}"
            exit 1
          fi
          echo "All jobs passed."
