name: CI

on:
  push:
    branches: [main]
  pull_request:

# Read-only token. Using the `pull_request` event (not `pull_request_target`)
# means PRs from forks run in the fork's context with no access to repository
# secrets — safe for community contributions.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test & lint (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # NOTE: the branch ruleset requires a status check named "CI". That is the
    # `ci` gate job below, not this matrix job. Keep the names in sync.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check . && ruff format --check .

      - name: Test
        run: python -m pytest

  # Non-editable install smoke: build the wheel, install it into a clean
  # venv, and walk the brownfield flow. Editable installs mask packaging
  # bugs (missing package data, deps hidden in extras) — this leg is the
  # only place they can surface before a user does (issues #40/#43 dogfood).
  wheel-smoke:
    name: wheel install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: pipx run build --wheel

      - name: Install wheel into a clean venv
        run: |
          python -m venv /tmp/wheelenv
          /tmp/wheelenv/bin/pip install --quiet dist/*.whl

      - name: strata register + refuse-to-start smoke (foreign project)
        run: |
          set -eu
          mkdir /tmp/foreign && cd /tmp/foreign && git init -q
          /tmp/wheelenv/bin/strata register
          test -f .strata/config.toml
          test -f .strata/fleet.yaml
          # No binding → must exit 1 with the aggregated refuse-to-start
          # message, NOT a traceback.
          set +e
          out=$(/tmp/wheelenv/bin/strata-mcp </dev/null 2>&1)
          rc=$?
          set -e
          [ "$rc" -eq 1 ]
          echo "$out" | grep -q "refuses to start"
          if echo "$out" | grep -q "Traceback"; then
            echo "strata-mcp crashed with a traceback:"; echo "$out"; exit 1
          fi

      # The Console must serve from the wheel install (issue #65) — a
      # repo-root ui/ path resolves to nothing in site-packages, and the
      # static mount silently serves 404s.
      - name: Console UI serves from the wheel
        run: |
          set -eu
          mkdir /tmp/uismoke && cd /tmp/uismoke
          /tmp/wheelenv/bin/strata start --port 8971 > server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          curl --retry 20 --retry-connrefused --retry-delay 1 -fsS \
            http://127.0.0.1:8971/ui/index.html | grep -q "Strata Console"
          curl -fsS -o /dev/null http://127.0.0.1:8971/ui/atlas.css
          curl -fsS -o /dev/null http://127.0.0.1:8971/scopes

  # Single, stable status-check context required by the branch ruleset.
  # Succeeds only if every matrix leg of `test` succeeded.
  ci:
    name: CI
    needs: [test, wheel-smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify matrix result
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.wheel-smoke.result }}" != "success" ]; then
            echo "test: ${{ needs.test.result }}, wheel-smoke: ${{ needs.wheel-smoke.result }}"
            exit 1
          fi
          echo "All jobs passed."
